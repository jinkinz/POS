name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate database
        working-directory: packages/db
        run: npx prisma migrate deploy

      - name: End-to-end suites
        run: bash e2e/run.sh

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/pos-e2e/*.log
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t pos-api .

      - name: Build web image
        run: docker build -f deploy/Dockerfile.web -t pos-web .

      - name: Smoke API image (boot against throwaway Postgres)
        run: |
          docker network create pos-net
          docker run -d --network pos-net --name db \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=pos postgres:16
          for i in $(seq 1 30); do
            docker exec db pg_isready -U postgres && break; sleep 1
          done
          docker run -d --network pos-net --name api -p 3000:3000 \
            -e DATABASE_URL=postgresql://postgres:postgres@db:5432/pos \
            -e JWT_SECRET=ci-smoke-secret pos-api
          for i in $(seq 1 45); do
            curl -sf http://localhost:3000/api/health && READY=1 && break; sleep 2
          done
          [ "${READY:-0}" = "1" ] || { docker logs api; exit 1; }
          echo; echo "API image boots and serves health with migrations applied"
