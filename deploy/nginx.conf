# Four SPAs, each proxying /api and /socket.io to the API service.
# The api host resolves via Docker DNS (compose service name "api").

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- shared proxy snippets (inlined per server; nginx has no includes here) ----

server {
    listen 8081;
    root /usr/share/nginx/html/pos;
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location / { try_files $uri /index.html; }
}

